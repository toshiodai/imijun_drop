<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>意味順ドロップ</title>
<style>
  :root{
    --ink:#141a2b; --ink2:#1d2438; --panel:#232c44;
    --paper:#f6f2e9; --line:#38425f;
    /* 意味順（MAP Grammar）公式配色に準拠 */
    --b0:#ce1e4e; /* だれが   */
    --b1:#45a9d6; /* 頻度 */
    --b2:#45a9d6; /* する・です */
    --b3:#3e9e3e; /* だれ     */
    --b4:#7e3193; /* なに     */
    --b5:#e1912f; /* どこ     */
    --b6:#2e74c0; /* いつ     */
    --good:#7ee787; --bad:#ff7a8a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:radial-gradient(120% 90% at 50% -10%, #202a45 0%, var(--ink) 55%);
    color:var(--paper);
    font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    display:flex; justify-content:center; align-items:stretch; overflow:hidden;
  }
  #wrap{width:100%; max-width:560px; height:100dvh; display:flex; flex-direction:column;
        padding:10px 10px 14px; gap:10px;}

  /* HUD */
  #hud{display:flex; align-items:center; gap:8px; font-weight:700;}
  .pill{background:var(--panel); border:1px solid var(--line); border-radius:999px;
        padding:6px 12px; font-size:13px; display:flex; gap:6px; align-items:center;}
  .pill small{opacity:.55; font-weight:600;}
  #combo{color:var(--good); min-width:44px; text-align:right; font-variant-numeric:tabular-nums;
         opacity:0; transition:opacity .2s;} #combo.on{opacity:1;}
  #lives{margin-left:auto; letter-spacing:2px; font-size:17px;}

  /* goal */
  #goal{background:var(--ink2); border:1px solid var(--line); border-radius:14px;
        padding:10px 14px; text-align:center;}
  #goal .lbl{font-size:11px; opacity:.5; letter-spacing:.14em; font-weight:700;}
  #goal .jp{font-size:16px; font-weight:700; margin-top:2px;}

  /* field */
  #field{position:relative; flex:1; min-height:0; overflow:hidden; border-radius:14px;
         background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.18));
         border:1px solid var(--line);}
  .card{position:absolute; left:50%; top:0; transform:translateX(-50%);
        background:var(--paper); color:#222; font-weight:800; font-size:19px;
        padding:12px 18px; border-radius:12px; white-space:nowrap;
        box-shadow:0 8px 0 rgba(0,0,0,.22), 0 12px 26px rgba(0,0,0,.35); will-change:top;}
  .card.wrong{animation:shake .3s;}
  @keyframes shake{0%,100%{margin-left:0}25%{margin-left:-9px}75%{margin-left:9px}}
  .card.ghost{transition:top .18s cubic-bezier(.5,0,.7,1), left .18s, transform .18s, opacity .18s;}

  /* boxes */
  #boxes{display:flex; gap:5px;}
  .box{flex:1; min-width:0; border-radius:12px; border:1px solid var(--line);
       background:var(--ink2); padding:8px 3px 9px; text-align:center; cursor:pointer;
       position:relative; transition:transform .08s, background .12s, border-color .12s; user-select:none;}
  .box:active{transform:translateY(2px);}
  .box .name{display:inline-block; background:var(--bx); color:#fff;
             font-size:10.5px; font-weight:800; padding:3px 8px; border-radius:999px;
             white-space:nowrap; box-shadow:0 2px 0 rgba(0,0,0,.28);}
  .box .key{position:absolute; top:4px; left:5px; font-size:10px; opacity:.35; font-weight:700;}
  .box .slot{margin-top:7px; min-height:30px; display:flex; align-items:center; justify-content:center;
             font-size:14px; font-weight:800; color:var(--paper); line-height:1.15; padding:0 2px;}
  .box .slot:empty::after{content:"·····"; color:var(--bx); opacity:.4; letter-spacing:1px;}
  .box.filled{background:color-mix(in srgb, var(--bx) 22%, var(--ink2)); border-color:var(--bx);}
  .box.flash{animation:pop .28s;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.09)}100%{transform:scale(1)}}
  .box.hide{display:none;}

  /* overlays */
  .screen{position:absolute; inset:0; z-index:20; display:flex; flex-direction:column;
          justify-content:center; align-items:center; gap:16px; text-align:center;
          background:rgba(12,16,28,.86); backdrop-filter:blur(3px); padding:24px;}
  .screen.hide{display:none;}
  .screen h1{margin:0; font-size:30px;} .screen h1 span{color:var(--b1);}
  .screen p{margin:0; opacity:.82; font-size:14px; line-height:1.7; max-width:360px;}
  .btn{background:var(--b1); color:#04283a; border:none; font-weight:800; font-size:17px;
       padding:13px 30px; border-radius:999px; cursor:pointer; box-shadow:0 6px 0 #2b7ba0;}
  .btn:active{transform:translateY(3px); box-shadow:0 3px 0 #2b7ba0;}
  .mini{display:flex; gap:6px; flex-wrap:wrap; justify-content:center;}
  .chip{font-size:12px; font-weight:800; padding:5px 11px; border-radius:999px; color:#fff;}
  #toast{position:absolute; top:14px; left:50%; transform:translateX(-50%);
         font-weight:800; font-size:20px; opacity:0; pointer-events:none; z-index:15;
         text-shadow:0 2px 8px rgba(0,0,0,.5); white-space:nowrap;}
  #toast.show{animation:rise .9s;}
  @keyframes rise{0%{opacity:0; transform:translate(-50%,6px)}18%{opacity:1}100%{opacity:0; transform:translate(-50%,-22px)}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="pill"><small>LV</small><span id="lv">1</span></div>
    <div class="pill"><small>SCORE</small><span id="score">0</span></div>
    <div id="combo"></div>
    <div id="lives"></div>
  </div>

  <div id="goal">
    <div class="lbl">この文を つくろう</div>
    <div class="jp" id="jp">—</div>
  </div>

  <div id="field">
    <div id="toast"></div>

    <div class="screen" id="start">
      <h1>意味順<span>ドロップ</span></h1>
      <p>落ちてくる語句を、正しい意味順の箱にタップで振り分けよう。<br>パソコンなら数字キー <b>1〜6</b> でもOK。</p>
      <div class="mini">
        <span class="chip" style="background:var(--b0)">だれが</span>
        <span class="chip" style="background:var(--b1)">頻度</span>
        <span class="chip" style="background:var(--b2)">する・です</span>
        <span class="chip" style="background:var(--b3)">だれ</span>
        <span class="chip" style="background:var(--b4)">なに</span>
        <span class="chip" style="background:var(--b5)">どこ</span>
        <span class="chip" style="background:var(--b6)">いつ</span>
      </div>
      <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="screen hide" id="over">
      <h1>ゲーム<span>オーバー</span></h1>
      <p id="overText">—</p>
      <button class="btn" id="againBtn">もう一度</button>
    </div>
  </div>

  <div id="boxes"></div>
</div>

<script>
// 0 だれが / 1 頻度 / 2 する・です / 3 だれ / 4 なに / 5 どこ / 6 いつ
const BOXES = [
  {name:"だれが",   v:"--b0"},
  {name:""頻度",   v:"--b1"},
  {name:"する・です", v:"--b2"},
  {name:"だれ",     v:"--b3"},
  {name:"なに",     v:"--b4"},
  {name:"どこ",     v:"--b5"},
  {name:"いつ",     v:"--b6"},
];

const BANK = [
  // SVO（だれが・する・なに）
  {jp:"私は英語を勉強します。",       c:[["I",0],["study",2],["English",4]]},
  {jp:"彼は本を読みます。",           c:[["He",0],["reads",2],["a book",4]]},
  {jp:"私たちはサッカーをします。",     c:[["We",0],["play",2],["soccer",4]]},
  {jp:"彼女は音楽が好きです。",         c:[["She",0],["likes",2],["music",4]]},
  {jp:"私はコーヒーを飲みます。",       c:[["I",0],["drink",2],["coffee",4]]},
  {jp:"その犬はボールが好きです。",     c:[["The dog",0],["likes",2],["the ball",4]]},

  // ＋どこ
  {jp:"私は公園で走ります。",           c:[["I",0],["run",2],["in the park",5]]},
  {jp:"彼らは学校で勉強します。",       c:[["They",0],["study",2],["at school",5]]},
  {jp:"私は図書館で本を読みます。",     c:[["I",0],["read",2],["a book",4],["in the library",5]]},
  {jp:"彼女は台所で料理をします。",     c:[["She",0],["cooks",2],["in the kitchen",5]]},

  // ＋だれ（授与文 SVOO）
  {jp:"私は彼女に手紙を書きます。",     c:[["I",0],["write",2],["her",3],["a letter",4]]},
  {jp:"彼は私にプレゼントをくれます。", c:[["He",0],["gives",2],["me",3],["a present",4]]},
  {jp:"母は私に朝食を作ります。",       c:[["My mother",0],["makes",2],["me",3],["breakfast",4]]},
  {jp:"先生は私たちに物語を読みます。", c:[["The teacher",0],["reads",2],["us",3],["a story",4]]},

  // ＋いつ（フル）
  {jp:"私は毎朝走ります。",             c:[["I",0],["run",2],["every morning",6]]},
  {jp:"彼は日曜日に野球をします。",     c:[["He",0],["plays",2],["baseball",4],["on Sunday",6]]},
  {jp:"私は毎晩公園を歩きます。",       c:[["I",0],["walk",2],["in the park",5],["every evening",6]]},
  {jp:"私たちは夏に海へ行きます。",     c:[["We",0],["go",2],["to the sea",5],["in summer",6]]},
  {jp:"彼らは毎日学校で私に英語を教えます。",
                                       c:[["They",0],["teach",2],["me",3],["English",4],["at school",5],["every day",6]]},
];

const $ = s => document.querySelector(s);
const field = $("#field"), boxesEl = $("#boxes"), toast = $("#toast");
let boxEls = [];
let lives, score, level, cleared, combo, active, queue, placed, current, running, raf, lastT;
let card=null, cardY=0, cardH=54, speed=0;
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; };

function buildBoxes(){
  boxesEl.innerHTML = "";
  boxEls = BOXES.map((b,i)=>{
    const el = document.createElement("div");
    el.className = "box"; el.style.setProperty("--bx", `var(${b.v})`);
    el.innerHTML = `<span class="key">${i+1}</span><div class="name">${b.name}</div><div class="slot"></div>`;
    el.addEventListener("click", ()=>tryPlace(i));
    boxesEl.appendChild(el);
    return el;
  });
}
function activeBoxes(){
  if(level<=1) return [0,1,3];        // だれが・する・なに
  if(level===2) return [0,1,3,4];     // ＋どこ
  if(level===3) return [0,1,2,3,4];   // ＋だれ（SVOO）
  return [0,1,2,3,4,5];               // ＋いつ
}
function refreshBoxes(){
  active = activeBoxes();
  boxEls.forEach((el,i)=> el.classList.toggle("hide", !active.includes(i)));
}
function fallDuration(){ return Math.max(1900, 4600 - (level-1)*500); }

function setHUD(){
  $("#lv").textContent = level; $("#score").textContent = score;
  $("#lives").innerHTML = "♥".repeat(lives).replace(/♥/g,"<span style='color:var(--bad)'>♥</span>")
                        + "<span style='opacity:.18'>♥</span>".repeat(Math.max(0,3-lives));
  const c=$("#combo");
  if(combo>=2){ c.textContent="×"+combo; c.classList.add("on"); } else c.classList.remove("on");
}
function showToast(t,color){ toast.textContent=t; toast.style.color=color||"var(--paper)";
  toast.classList.remove("show"); void toast.offsetWidth; toast.classList.add("show"); }

function nextSentence(){
  const pool = BANK.filter(s => s.c.every(ch => active.includes(ch[1])));
  current = pool[Math.random()*pool.length|0];
  $("#jp").textContent = current.jp;
  boxEls.forEach(el=>{ el.querySelector(".slot").textContent=""; el.classList.remove("filled"); });
  placed = new Set();
  queue = shuffle(current.c.map((_,i)=>i));
  spawn();
}
function spawn(){
  if(queue.length===0){ sentenceComplete(); return; }
  const [text] = current.c[queue[0]];
  card = document.createElement("div"); card.className="card"; card.textContent=text;
  field.appendChild(card);
  cardH = card.offsetHeight; cardY = -cardH;
  speed = (field.clientHeight - cardH) / fallDuration();
  card.style.top = cardY+"px"; lastT = performance.now();
}
function loop(t){
  if(!running) return;
  if(card){
    const dt=t-lastT; lastT=t; cardY += speed*dt;
    const limit = field.clientHeight - cardH;
    if(cardY>=limit){ cardY=limit; card.style.top=cardY+"px"; missCurrent(); }
    else card.style.top = cardY+"px";
  }
  raf = requestAnimationFrame(loop);
}
function tryPlace(boxIdx){
  if(!running || !card || card.classList.contains("ghost")) return;
  const cIdx = queue[0];
  const [text, correct] = current.c[cIdx];
  if(boxIdx === correct){
    const bRect = boxEls[boxIdx].getBoundingClientRect();
    const fRect = field.getBoundingClientRect();
    card.classList.add("ghost");
    card.style.left = (bRect.left - fRect.left + bRect.width/2)+"px";
    card.style.top  = (bRect.top - fRect.top - cardH*0.4)+"px";
    card.style.transform = "translateX(-50%) scale(.7)"; card.style.opacity="0";
    const gone=card; setTimeout(()=>gone.remove(),180);
    const slot = boxEls[boxIdx].querySelector(".slot"); slot.textContent=text;
    boxEls[boxIdx].classList.add("filled","flash");
    setTimeout(()=>boxEls[boxIdx].classList.remove("flash"),300);
    card=null; placed.add(cIdx); queue.shift();
    combo++; score += 10 + Math.max(0,combo-1)*2; setHUD(); beep(660,0.06); spawn();
  } else {
    card.classList.add("wrong"); setTimeout(()=>card&&card.classList.remove("wrong"),300);
    penalty("箱ちがい");
  }
}
function missCurrent(){ penalty("時間切れ"); if(card){card.remove();card=null;}
  const dead=queue.shift(); queue.push(dead); spawn(); }
function penalty(reason){ combo=0; lives--; setHUD(); beep(150,0.12);
  showToast(reason,"var(--bad)"); if(lives<=0) gameOver(); }
function sentenceComplete(){
  cleared++;
  const sentence = current.c.map(ch=>ch[0]).join(" ");
  score+=50; combo=0; setHUD();
  showToast("+50  "+sentence,"var(--good)"); beep(880,0.08); speak(sentence);
  if(cleared%3===0){ level++; refreshBoxes(); showToast("LEVEL "+level+"!","var(--b1)"); }
  setTimeout(()=>{ if(running) nextSentence(); },1400);
}

let actx;
function beep(freq,dur){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(), g=actx.createGain(); o.frequency.value=freq; o.type="triangle";
  o.connect(g); g.connect(actx.destination); g.gain.setValueAtTime(0.12,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur); o.start(); o.stop(actx.currentTime+dur);}catch(e){} }
function speak(text){ try{ const u=new SpeechSynthesisUtterance(text); u.lang="en-US"; u.rate=.95;
  speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }

function startGame(){
  lives=3; score=0; level=1; cleared=0; combo=0; running=true;
  $("#start").classList.add("hide"); $("#over").classList.add("hide");
  refreshBoxes(); setHUD(); nextSentence();
  cancelAnimationFrame(raf); raf=requestAnimationFrame(loop);
}
function gameOver(){ running=false; if(card){card.remove();card=null;} cancelAnimationFrame(raf);
  $("#overText").innerHTML = `スコア <b style="color:var(--b1);font-size:22px">${score}</b><br>クリアした文：${cleared}　到達レベル：${level}`;
  $("#over").classList.remove("hide"); }

document.addEventListener("keydown", e=>{
  if(!running) return;
  const n=parseInt(e.key,10);
  if(n>=1 && n<=6 && active.includes(n-1)) tryPlace(n-1);
});
$("#startBtn").addEventListener("click", startGame);
$("#againBtn").addEventListener("click", startGame);

buildBoxes(); active=[0,1,3];
</script>
</body>
</html>
